<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ਸਵੇਰ ਦੀ ਸਭਾ - ਵੀਡੀਓ ਸਟੂਡੀਓ</title>
    <style>
        /* 1. ਮਾਸਟਰ ਲੇਆਊਟ - 16:9 ਸਿਨੇਮੈਟਿਕ */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; -webkit-tap-highlight-color: transparent; }

        html, body {
            width: 100%; height: 100%; overflow: hidden; background-color: #000;
            display: flex; align-items: center; justify-content: center;
        }

        #studio-frame {
            aspect-ratio: 16 / 9; width: 100vw; max-width: 177.78vh;
            height: auto; max-height: 100vh;
            background: #000; position: relative; overflow: hidden;
            box-shadow: 0 0 100px rgba(0,0,0,1);
        }

        #bg-layer {
            position: absolute; inset: 0; z-index: 1;
            background: linear-gradient(-45deg, #ff0844, #ffb199, #c71585, #ff1493);
            background-size: 400% 400%; animation: moveBG 15s ease infinite;
        }
        @keyframes moveBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        #border-frame {
            position: absolute; inset: 0; z-index: 1000; pointer-events: none;
            border: 2.2vmin solid #ffd700; box-shadow: inset 0 0 5vmin rgba(0,0,0,0.8);
        }

        /* 2. ਫਲੈਸ਼ ਕਾਰਡ ਅਤੇ ਐਨੀਮੇਸ਼ਨ */
        #viewport {
            position: absolute; inset: 0; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            perspective: 2500px;
        }

        .flash-card {
            position: absolute; width: 85%; max-width: 1100px;
            background: rgba(0, 0, 0, 0.95); border: 0.8vmin solid #ffd700;
            border-radius: 4.5vmin; padding: 5vmin 7vmin; color: white; text-align: center;
            box-shadow: 0 4vmin 8vmin rgba(0,0,0,0.9);
            opacity: 0; transform: scale(0.6) translateY(100vh);
            transition: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            visibility: hidden; transform-style: preserve-3d;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .flash-card.active {
            opacity: 1; transform: scale(1) translateY(0);
            visibility: visible; z-index: 100;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.5);
        }

        /* ਤਿਤਲੀ ਵਰਗਾ ਫੰਗ ਮਾਰਦਾ ਅਤੇ ਬਾਊਂਸੀ ਐਗਜ਼ਿਟ */
        .flash-card.exit {
            animation: flapWings 0.3s infinite ease-in-out, bounceFlyAway 4s forwards linear;
            pointer-events: none;
        }

        @keyframes flapWings {
            0%, 100% { transform: rotateY(0deg); }
            50% { transform: rotateY(20deg); }
        }

        @keyframes bounceFlyAway {
            0% { transform: scale(1) translate(0,0) rotate(0); opacity: 1; }
            20% { transform: scale(0.85) translate(-20vw, -20vh) rotate(-10deg); opacity: 0.9; }
            50% { transform: scale(0.6) translate(30vw, -60vh) rotate(15deg); opacity: 0.6; }
            80% { transform: scale(0.3) translate(-15vw, -110vh) rotate(-5deg); opacity: 0.3; }
            100% { transform: scale(0) translate(10vw, -180vh) rotate(360deg); opacity: 0; filter: blur(15px); }
        }

        .glitter {
            background: linear-gradient(-45deg, #ffd700, #fff, #ffaa00, #fff, #ffd700);
            background-size: 200% auto; -webkit-background-clip: text; background-clip: text;
            color: transparent; animation: shine 3s linear infinite; font-weight: 900;
        }
        @keyframes shine { to { background-position: 200% center; } }

        /* ਟੈਕਸਟ ਕੰਟਰੋਲ (ਬਾਹਰ ਜਾਣ ਤੋਂ ਰੋਕਣ ਲਈ) */
        .title-text { font-size: 7vmin; margin-bottom: 3.5vmin; line-height: 1.2; width: 100%; }
        .main-content { font-size: 4.8vmin; line-height: 1.4; font-weight: bold; width: 100%; word-break: keep-all; }
        
        .ans-area {
            margin-top: 4vmin; padding-top: 3.5vmin;
            border-top: 2px dashed rgba(255,215,0,0.3);
            color: #00ffff; font-size: 4.5vmin; font-weight: 900;
            white-space: pre-wrap; width: 100%; min-height: 12vmin;
        }

        .header-msg {
            color: #fff; font-size: 2.5vmin; line-height: 1.4; border-bottom: 1px dashed #ffd700;
            padding-bottom: 2vmin; margin-bottom: 3.5vmin; font-style: italic; width: 100%;
        }

        /* 3. ਸਟਾਰਟ/ਪੌਜ਼ ਇੰਡੀਕੇਟਰ */
        #playback-status {
            position: absolute; top: 4vmin; right: 4vmin; z-index: 5000;
            background: rgba(255,215,0,0.9); color: #000; padding: 1vmin 3vmin;
            border-radius: 30px; font-weight: 900; display: none;
        }
    </style>
</head>
<body>

    <div id="studio-frame" onclick="togglePlayPause()">
        <div id="bg-layer"></div>
        <div id="border-frame"></div>
        <div id="playback-status">Paused</div>

        <div id="viewport">

            <div class="flash-card" id="master-card">
                <!-- ਹੈਡਰ ਡਿਫਾਲਟ ਹਾਈਡ ਰਹੇਗਾ, ਸਿਰਫ ਪਹਿਲੀ ਸਲਾਈਡ ਤੇ ਆਵੇਗਾ -->
                <div class="header-msg" id="card-header" style="display: none;"></div>
                <div class="glitter title-text" id="type-title"></div>
                <div class="main-content" id="type-main"></div>
                <div class="ans-area" id="type-ans"></div>
            </div>
        </div>
    </div>

    // --- ਫੁੱਲ ਸਕਰੀਨ ਕਰਨ ਵਾਲਾ ਫੰਕਸ਼ਨ ---
    function forceFullScreen() { 
        try { 
            if (!document.fullscreenElement) { 
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen(); 
                } else if (document.documentElement.webkitRequestFullscreen) {
                    document.documentElement.webkitRequestFullscreen(); // Safari/iOS ਲਈ
                } 
            } 
        } catch (e) {} 
    }

    // --- ਡਬਲ ਟੈਪ (Double Tap) ਲੌਜਿਕ ---
    let lastTapTime = 0;
    
    // ਮੋਬਾਈਲ ਲਈ ਡਬਲ ਟੈਪ
    document.addEventListener('touchstart', function(e) {
        const currentTime = new Date().getTime();
        const tapLength = currentTime - lastTapTime;
        if (tapLength < 500 && tapLength > 0) {
            forceFullScreen();
        }
        lastTapTime = currentTime;
    });

    // ਕੰਪਿਊਟਰ/ਮਾਊਸ ਲਈ ਡਬਲ ਕਲਿੱਕ
    document.addEventListener('dblclick', function(e) {
        forceFullScreen();
    });

            main: "Thread (ਥ੍ਰੈੱਡ) - ਧਾਗਾ", 
            ans: "Sentence: Bring a needle and thread.\nਇੱਕ ਸੂਈ ਅਤੇ ਧਾਗਾ ਲਿਆਓ।",
            t_audio: "Teacher: Thread. ਥ੍ਰੈੱਡ ਮਤਲਬ ਧਾਗਾ",
            c_audio: "Child: Bring a needle and thread. ਇੱਕ ਸੂਈ ਅਤੇ ਧਾਗਾ ਲਿਆਓ"
        },
        { 
            title: "ਧੰਨਵਾਦ ਜੀ", 
            main: "ਅਜਿਹੀਆਂ ਹੋਰ ਸਿੱਖਿਆਦਾਇਕ ਵੀਡੀਓਜ਼ ਲਈ ਚੈਨਲ ਨੂੰ ਸਬਸਕ੍ਰਾਈਬ, ਲਾਈਕ ਅਤੇ ਸ਼ੇਅਰ ਕਰੋ।", 
            ans: "ਤੁਹਾਡਾ ਦਿਨ ਸ਼ੁਭ ਰਹੇ! ਧੰਨਵਾਦ ਜੀ।",
            audio: "Teacher: ਬੱਚਿਓ ਜੇਕਰ ਤੁਹਾਨੂੰ ਇਹ ਵੀਡੀਓ ਵਧੀਆ ਲੱਗੀ ਤਾਂ ਅਜਿਹੀਆਂ ਹੋਰ ਸਿੱਖਿਆਦਾਇਕ ਵੀਡੀਓਜ਼ ਲਈ ਮੇਰੇ ਚੈਨਲ ਨੂੰ ਸਬਸਕ੍ਰਾਈਬ ਕਰੋ ਲਾਈਕ ਅਤੇ ਕਮੈਂਟ ਕਰੋ ਤੁਹਾਡਾ ਇੱਕ ਲਾਈਕ ਜਾਂ ਕਮੈਂਟ ਸਾਨੂੰ ਹੋਰ ਉਤਸ਼ਾਹ ਦਿੰਦਾ ਹੈ ਧੰਨਵਾਦ ਜੀ ਤੁਹਾਡਾ ਦਿਨ ਸ਼ੁਭ ਰਹੇ ਫਿਰ ਮਿਲਾਂਗੇ ਇੱਕ ਨਵੀਂ ਵੀਡੀਓ ਦੇ ਨਾਲ"
        }
    ];

    // --- ਆਟੋ-ਸਟਾਰਟ ਲੌਜਿਕ (3 ਸੈਕਿੰਡ ਦੀ ਬਲੈਂਕ ਸਕ੍ਰੀਨ) ---
    function startProduction() {
        if (hasStarted) return;
        hasStarted = true;
        
        // 3 ਸੈਕਿੰਡ ਲਈ ਸਕ੍ਰੀਨ ਬਲੈਂਕ ਰਹੇਗੀ (ਸਿਰਫ਼ ਬੈਕਗ੍ਰਾਊਂਡ), ਫਿਰ ਸਲਾਈਡਾਂ ਸ਼ੁਰੂ ਹੋਣਗੀਆਂ
        setTimeout(() => {
            isStartedSlide = true; // ਹੁਣ ਪੌਜ਼ ਬਟਨ ਕੰਮ ਕਰ ਸਕਦਾ ਹੈ
            executeStep(0);
        }, 3000);
    }

    // ਪਹਿਲੇ ਟੱਚ ਜਾਂ ਕਲਿੱਕ 'ਤੇ ਆਟੋਮੈਟਿਕ ਸ਼ੁਰੂਆਤ (Audio Autoplay ਲਈ ਜ਼ਰੂਰੀ)
    document.addEventListener('click', startProduction);
    document.addEventListener('touchstart', startProduction, {passive: true});

    async function executeStep(idx) {
        if(idx >= slideSteps.length) return;
        currentIdx = idx;
        const data = slideSteps[idx];
        const card = document.getElementById('master-card');

        // 1. ਰੀਸੈੱਟ ਅਤੇ ਐਕਟਿਵ
        card.classList.remove('exit');
        card.style.visibility = "hidden";
        
        // ਹੈਡਰ ਫਿਕਸ: ਸਿਰਫ਼ ਪਹਿਲੀ ਸਲਾਈਡ ਤੇ ਦਿਖਾਓ
        const headerEl = document.getElementById('card-header');
        if(data.header) {
            headerEl.textContent = data.header;
            headerEl.style.display = "block";
        } else {
            headerEl.style.display = "none";
        }

        document.getElementById('type-title').textContent = "";
        document.getElementById('type-main').textContent = "";
        document.getElementById('type-ans').textContent = "";
        
        await new Promise(r => setTimeout(r, 100));
        card.style.visibility = "visible";
        card.classList.add('active');

        // 2. ਟਾਈਟਲ ਟਾਈਪਿੰਗ
        await typeWriter('type-title', data.title, 80);

        // 3. ਮੇਨ ਟੈਕਸਟ ਅਤੇ ਆਡੀਓ
        if(data.audio) {
            speak(data.audio, "Kore");
            await typeWriter('type-main', data.main, 100);
        } else {
            await speak(data.t_audio, "Kore");
            await typeWriter('type-main', data.main, 110);
            
            // 4. ਉੱਤਰ ਟਾਈਪਿੰਗ ਅਤੇ ਬੱਚੇ ਦੀ ਆਡੀਓ
            await new Promise(r => setTimeout(r, 600));
            await speak(data.c_audio, "Puck");
            if(data.ans) await typeWriter('type-ans', data.ans, 130);
            if(data.e_audio) await speak(data.e_audio, "Kore");
        }

        // 5. ਐਨੀਮੇਸ਼ਨ ਨਾਲ ਬਾਹਰ ਭੇਜੋ
        setTimeout(() => {
            if(idx < slideSteps.length - 1) {
                while(isPaused) { /* Wait loop */ }
                card.classList.remove('active');
                card.classList.add('exit');
                setTimeout(() => executeStep(idx + 1), 1200);
            }
        }, 2500);
    }

    async function typeWriter(id, text, speed) {
        const el = document.getElementById(id); if(!el) return;
        let i = 0;
        return new Promise(resolve => {
            const timer = setInterval(() => {
                if (!isPaused) {
                    el.textContent += text.charAt(i);
                    i++;
                    if(i >= text.length) { clearInterval(timer); resolve(); }
                }
            }, speed);
        });
    }

    function togglePlayPause() {
        if (!isStartedSlide) return; // ਸਲਾਈਡ ਸ਼ੁਰੂ ਹੋਣ ਤੋਂ ਪਹਿਲਾਂ ਕਲਿੱਕ ਨੂੰ ਇਗਨੋਰ ਕਰੋ
        isPaused = !isPaused;
        document.getElementById('playback-status').style.display = isPaused ? 'block' : 'none';
        if(!isPaused) { if(player.paused) player.play(); } else { player.pause(); }
    }

    async function speak(text, voice) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;
        const payload = {
            contents: [{ parts: [{ text: text }] }],
            generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voice } } } },
            model: "gemini-2.5-flash-preview-tts"
        };
        try {
            const res = await fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            const d = await res.json();
            const b64 = d.candidates[0].content.parts[0].inlineData.data;
            player.src = `data:audio/wav;base64,${b64}`;
            return new Promise(r => { player.onended = r; player.play().catch(r); });
        } catch(e) { return new Promise(r => setTimeout(r, 2000)); }
    }
</script>
