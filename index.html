<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ਪ੍ਰਾਇਮਰੀ ਸਿੱਖਿਆ ਪੰਜਾਬ - 3D ਪਲੇਟਫਾਰਮ</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- ਗੁਰਮੁਖੀ ਫੋਂਟ -->
    <link href="https://fonts.googleapis.com/css2?family=Mukta+Malar:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 'punjabi': ['"Mukta Malar"', 'sans-serif'] },
                    colors: {
                        'punjab-blue': '#0f4c81', 'punjab-gold': '#f59e0b', 'punjab-orange': '#ea580c'
                    }
                }
            }
        }
    </script>
    <style>
        /* ਬੈਕਗਰਾਊਂਡ ਅਤੇ ਬੇਸਿਕ ਸੈਟਿੰਗਜ਼ */
        body { 
            font-family: 'Mukta Malar', sans-serif; 
            background: linear-gradient(135deg, #e0f2fe 0%, #fef08a 50%, #fbcfe8 100%);
            background-attachment: fixed;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        /* 3D ਬੈਕਗਰਾਊਂਡ ਪੈਟਰਨ */
        .bg-3d-pattern {
            background-image: 
                radial-gradient(circle at 100% 150%, rgba(255,255,255,0.3) 24%, white 24%, white 28%, rgba(255,255,255,0.3) 28%, rgba(255,255,255,0.3) 36%, white 36%, white 40%, transparent 40%, transparent),
                radial-gradient(circle at 0    150%, rgba(255,255,255,0.3) 24%, white 24%, white 28%, rgba(255,255,255,0.3) 28%, rgba(255,255,255,0.3) 36%, white 36%, white 40%, transparent 40%, transparent);
            background-size: 60px 60px;
        }

        /* --- 3D CLAYMORPHISM (ਸਥੂਲ ਬਲਾਕ) --- */
        .clay-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            border: 2px solid rgba(255, 255, 255, 0.9);
            box-shadow: 
                8px 12px 25px rgba(0, 0, 0, 0.15), 
                inset 0 8px 15px rgba(255, 255, 255, 1), 
                inset 0 -8px 15px rgba(0, 0, 0, 0.05);
        }

        .btn-3d-super {
            position: relative;
            border-radius: 1.5rem;
            border: 2px solid rgba(255, 255, 255, 0.4);
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(0);
        }
        
        .btn-3d-super::before {
            content: ""; position: absolute; inset: 0; border-radius: inherit;
            box-shadow: inset 0 8px 20px rgba(255,255,255,0.6), inset 0 -8px 20px rgba(0,0,0,0.2);
            pointer-events: none;
        }

        .btn-3d-super:active {
            transform: translateY(6px) !important;
            box-shadow: 0 2px 0 var(--shadow-color), 0 4px 8px rgba(0,0,0,0.3) !important;
        }

        /* ਟੈਕਸਟ ਲਈ 3D ਸ਼ੈਡੋ */
        .text-3d { text-shadow: 0 3px 3px rgba(0,0,0,0.3); }
        .text-3d-light { text-shadow: 0 2px 2px rgba(255,255,255,0.8); }

        /* ਫਲੋਟਿੰਗ ਅਤੇ ਬਾਊਂਸ ਐਨੀਮੇਸ਼ਨ */
        .float-anim { animation: float 4s ease-in-out infinite; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-8px); } 100% { transform: translateY(0px); } }

        .bounce-anim { animation: bounceIcon 2s ease-in-out infinite; }
        @keyframes bounceIcon { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15) rotate(5deg); } }

        /* ਸਕ੍ਰੋਲ ਬਾਰ ਡਿਜ਼ਾਈਨ */
        .custom-scroll::-webkit-scrollbar { width: 8px; height: 8px; } 
        .custom-scroll::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 10px; } 
        .custom-scroll::-webkit-scrollbar-thumb { background: linear-gradient(to bottom, #38bdf8, #2563eb); border-radius: 10px; border: 1px solid white; }

        /* ਵਿਊ ਕੰਟਰੋਲ */
        .view-section { display: none; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .view-section.active { display: block; }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.95) translateY(20px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }

        /* ਤਤਕਰਾ (Index) ਦੀਆਂ ਕਤਾਰਾਂ ਲਈ ਐਨੀਮੇਸ਼ਨ */
        .index-row { transition: all 0.2s ease-in-out; }
        .index-row:hover { transform: scale(1.01) translateX(4px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 10; position: relative; border-left: 4px solid #0ea5e9; }

        /* ਫਲੋਟਿੰਗ ਟੈਗਲਾਈਨ */
        @keyframes scroll-text { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
        .scrolling-container { width: 100%; overflow: hidden; white-space: nowrap; background: linear-gradient(90deg, #c59b08, #FFD700, #c59b08); padding: 8px 0; display: flex; align-items: center; border-bottom: 2px solid #b45309; }
        .scrolling-text { display: inline-block; animation: scroll-text 25s linear infinite; font-size: 1rem; font-weight: 800; color: #002244; }

        /* --- ਓਵਰਲੈਪਿੰਗ ਅਤੇ ਲੈਂਡਸਕੇਪ ਰਿਸਪੌਂਸਿਵ ਸੈਟਿੰਗਜ਼ --- */
        @media (orientation: landscape) and (max-height: 600px) {
            .btn-3d-super { padding: 0.75rem !important; }
            .landscape-shrink { transform: scale(0.9); margin-top: -5px; }
            #class-view .grid { gap: 1rem !important; }
            .subject-card-icon { font-size: 3rem !important; }
            .subject-card-title { font-size: 1.2rem !important; }
            .index-table-header { font-size: 0.8rem !important; }
            .index-table-content { font-size: 0.85rem !important; }
            .index-btn { padding: 0.4rem 0.8rem !important; font-size: 0.8rem !important; }
            /* ਲੈਂਡਸਕੇਪ ਵਿੱਚ ਟੇਬਲ ਨੂੰ ਸਕ੍ਰੋਲ ਕਰਨ ਲਈ ਥਾਂ ਦਿਓ */
            #chapters-list-container { max-height: 50vh !important; }
        }
        
        /* ਮੋਬਾਈਲ ਲਈ ਛੋਟੇ ਫੌਂਟ ਤਾਂ ਜੋ ਓਵਰਲੈਪ ਨਾ ਹੋਵੇ */
        @media (max-width: 640px) {
            .table-col-sno { width: 3rem !important; }
            .table-col-name { flex: 1; padding-left: 0.5rem !important; padding-right: 0.5rem !important; }
            .table-col-type { width: 4rem !important; font-size: 0.7rem !important; }
            .table-col-page { width: 3rem !important; font-size: 0.8rem !important; }
            .table-col-btn { width: 5rem !important; }
            .index-btn { px: 0.5rem !important; py: 0.3rem !important; font-size: 0.75rem !important; }
        }
    </style>
</head>
<body class="bg-3d-pattern pb-24 md:pb-8">

    <!-- 3D ਹੈਡਰ -->
    <header class="sticky top-2 md:top-4 z-50 px-2 md:px-4 max-w-7xl mx-auto w-full pt-1">
        <div class="clay-card bg-gradient-to-r from-blue-500 to-indigo-600 p-2 md:p-3 flex justify-between items-center shadow-[0_8px_20px_rgba(37,99,235,0.4)]">
            <div class="flex items-center gap-2 md:gap-3 cursor-pointer group" onclick="showHome()">
                
                <!-- 3D ਲੋਗੋ (ਡਿਗਰੀ ਵਾਲੀ ਟੋਪੀ - Graduation Cap) -->
                <div class="relative w-12 h-12 sm:w-14 sm:h-14 md:w-16 md:h-16 bg-gradient-to-br from-yellow-300 to-orange-400 rounded-full border-[3px] border-white shadow-[0_4px_0_#b45309,0_8px_10px_rgba(0,0,0,0.3)] flex items-center justify-center shrink-0 z-20 group-hover:scale-105 transition-transform float-anim">
                    <div class="absolute inset-0 rounded-full shadow-[inset_0_3px_8px_rgba(255,255,255,0.9),inset_0_-3px_8px_rgba(0,0,0,0.3)] pointer-events-none"></div>
                    <span class="text-2xl sm:text-3xl md:text-4xl drop-shadow-[0_3px_2px_rgba(0,0,0,0.4)]">🎓</span>
                </div>
                
                <div class="flex flex-col justify-center">
                    <h1 class="text-lg sm:text-xl md:text-2xl font-extrabold text-white text-3d tracking-wide leading-tight">ਪ੍ਰਾਇਮਰੀ ਸਿੱਖਿਆ ਪੰਜਾਬ</h1>
                    <p class="text-[0.6rem] sm:text-[0.7rem] md:text-xs font-bold text-yellow-200 bg-black/20 px-2 py-0.5 rounded-full inline-block mt-0.5 shadow-inner border border-white/10 w-max">3D ਡਿਜ਼ੀਟਲ ਪਲੇਟਫਾਰਮ</p>
                </div>
            </div>
            
            <nav class="hidden md:flex">
                <button onclick="showHome()" class="btn-3d-super bg-gradient-to-b from-white to-gray-200 text-blue-800 px-5 py-2 font-extrabold text-sm shadow-[0_4px_0_#94a3b8] flex items-center gap-2" style="--shadow-color: #94a3b8;">
                    <i class="fa-solid fa-house"></i> ਮੁੱਖ ਪੰਨਾ
                </button>
            </nav>
        </div>
    </header>

    <!-- ਫਲੋਟ ਕਰਦੀ ਟੈਗਲਾਈਨ -->
    <div class="scrolling-container mt-2">
        <div class="scrolling-text">
            <i class="fa-solid fa-star text-white mx-2"></i> ਜੀ ਆਇਆਂ ਨੂੰ! ਇਹ ਪਲੇਟਫਾਰਮ ਬੱਚਿਆਂ ਅਤੇ ਅਧਿਆਪਕਾਂ ਲਈ ਤਿਆਰ ਕੀਤਾ ਗਿਆ ਹੈ। 
            <i class="fa-solid fa-book-open text-red-700 mx-2"></i> ਸਾਰੇ ਵਿਸ਼ਿਆਂ ਦਾ ਮਟੀਰੀਅਲ ਅਪਲੋਡ ਕਰ ਦਿੱਤਾ ਗਿਆ ਹੈ। <i class="fa-solid fa-star text-white mx-2"></i>
        </div>
    </div>

    <!-- ਮੁੱਖ ਕੰਟੈਂਟ ਏਰੀਆ -->
    <main class="flex-grow container mx-auto px-2 md:px-4 py-4 md:py-6 relative max-w-6xl z-10">

        <!-- ================= VIEW 1: HOME (ਜਮਾਤਾਂ ਦੀ ਚੋਣ) ================= -->
        <div id="home-view" class="view-section active">
            
            <div class="text-center mb-6 md:mb-8">
                <div class="inline-block clay-card bg-white px-6 md:px-8 py-2 mb-2">
                    <h3 class="text-lg sm:text-xl md:text-3xl font-extrabold text-indigo-800 flex items-center gap-2">
                        <span class="text-2xl md:text-3xl bounce-anim">🎒</span> ਆਪਣੀ ਜਮਾਤ ਚੁਣੋ
                    </h3>
                </div>
            </div>
            
            <!-- 3D ਜਮਾਤਾਂ ਵਾਲੇ ਬਟਨ -->
            <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3 sm:gap-5 md:gap-6 px-1 mb-10">
                <!-- ਪਹਿਲੀ -->
                <button onclick="openClass(1)" class="btn-3d-super bg-gradient-to-b from-red-400 to-red-600 text-white p-3 sm:p-4 shadow-[0_8px_0_#991b1b,0_12px_15px_rgba(220,38,38,0.4)] flex flex-col items-center justify-center gap-2 group landscape-shrink" style="--shadow-color: #991b1b;">
                    <div class="bg-white/20 w-14 h-14 sm:w-16 sm:h-16 rounded-full flex items-center justify-center backdrop-blur-md shadow-inner border-2 border-white/50 group-hover:scale-110 transition-transform">
                        <span class="text-4xl sm:text-5xl font-black text-white text-3d pt-1">1</span>
                    </div>
                    <span class="text-base sm:text-lg md:text-xl font-extrabold text-3d tracking-wider">ਪਹਿਲੀ</span>
                </button>
                <!-- ਦੂਜੀ -->
                <button onclick="openClass(2)" class="btn-3d-super bg-gradient-to-b from-blue-400 to-blue-600 text-white p-3 sm:p-4 shadow-[0_8px_0_#1e3a8a,0_12px_15px_rgba(37,99,235,0.4)] flex flex-col items-center justify-center gap-2 group landscape-shrink" style="--shadow-color: #1e3a8a;">
                    <div class="bg-white/20 w-14 h-14 sm:w-16 sm:h-16 rounded-full flex items-center justify-center backdrop-blur-md shadow-inner border-2 border-white/50 group-hover:scale-110 transition-transform">
                        <span class="text-4xl sm:text-5xl font-black text-white text-3d pt-1">2</span>
                    </div>
                    <span class="text-base sm:text-lg md:text-xl font-extrabold text-3d tracking-wider">ਦੂਜੀ</span>
                </button>
                <!-- ਤੀਜੀ -->
                <button onclick="openClass(3)" class="btn-3d-super bg-gradient-to-b from-amber-400 to-orange-500 text-white p-3 sm:p-4 shadow-[0_8px_0_#9a3412,0_12px_15px_rgba(234,88,12,0.4)] flex flex-col items-center justify-center gap-2 group landscape-shrink" style="--shadow-color: #9a3412;">
                    <div class="bg-white/20 w-14 h-14 sm:w-16 sm:h-16 rounded-full flex items-center justify-center backdrop-blur-md shadow-inner border-2 border-white/50 group-hover:scale-110 transition-transform">
                        <span class="text-4xl sm:text-5xl font-black text-white text-3d pt-1">3</span>
                    </div>
                    <span class="text-base sm:text-lg md:text-xl font-extrabold text-3d tracking-wider">ਤੀਜੀ</span>
                </button>
                <!-- ਚੌਥੀ -->
                <button onclick="openClass(4)" class="btn-3d-super bg-gradient-to-b from-emerald-400 to-green-600 text-white p-3 sm:p-4 shadow-[0_8px_0_#14532d,0_12px_15px_rgba(22,163,74,0.4)] flex flex-col items-center justify-center gap-2 group landscape-shrink" style="--shadow-color: #14532d;">
                    <div class="bg-white/20 w-14 h-14 sm:w-16 sm:h-16 rounded-full flex items-center justify-center backdrop-blur-md shadow-inner border-2 border-white/50 group-hover:scale-110 transition-transform">
                        <span class="text-4xl sm:text-5xl font-black text-white text-3d pt-1">4</span>
                    </div>
                    <span class="text-base sm:text-lg md:text-xl font-extrabold text-3d tracking-wider">ਚੌਥੀ</span>
                </button>
                <!-- ਪੰਜਵੀਂ -->
                <button onclick="openClass(5)" class="col-span-2 sm:col-span-1 lg:col-span-1 btn-3d-super bg-gradient-to-b from-purple-400 to-fuchsia-600 text-white p-3 sm:p-4 shadow-[0_8px_0_#701a75,0_12px_15px_rgba(192,38,211,0.4)] flex flex-col items-center justify-center gap-2 group landscape-shrink" style="--shadow-color: #701a75;">
                    <div class="bg-white/20 w-14 h-14 sm:w-16 sm:h-16 rounded-full flex items-center justify-center backdrop-blur-md shadow-inner border-2 border-white/50 group-hover:scale-110 transition-transform">
                        <span class="text-4xl sm:text-5xl font-black text-white text-3d pt-1">5</span>
                    </div>
                    <span class="text-base sm:text-lg md:text-xl font-extrabold text-3d tracking-wider">ਪੰਜਵੀਂ</span>
                </button>
            </div>

            <!-- 3D ਸਵੇਰ ਦੀ ਸਭਾ -->
            <div class="clay-card bg-gradient-to-br from-yellow-50 to-orange-50 p-4 md:p-6">
                <div class="flex flex-col sm:flex-row items-center justify-between border-b-2 border-yellow-200 pb-3 mb-4">
                    <h3 class="text-xl sm:text-2xl md:text-3xl font-extrabold text-orange-700 flex items-center gap-2">
                        <span class="text-3xl md:text-4xl float-anim">🌞</span> ਸਵੇਰ ਦੀ ਸਭਾ
                    </h3>
                    <button onclick="openAssemblyView()" class="btn-3d-super mt-3 sm:mt-0 bg-gradient-to-b from-orange-400 to-red-500 text-white px-5 py-2 font-extrabold text-sm md:text-base shadow-[0_5px_0_#991b1b] flex items-center gap-2" style="--shadow-color: #991b1b;">
                        ਸਾਰੀਆਂ ਦੇਖੋ <i class="fa-solid fa-play"></i>
                    </button>
                </div>
                <div id="latest-assembly-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
            </div>
        </div>

        <!-- ================= VIEW 2: CLASS VIEW (3D ਵਿਸ਼ੇ) ================= -->
        <div id="class-view" class="view-section">
            <div class="clay-card bg-white p-3 md:p-4 mb-6 flex items-center justify-between">
                <h2 id="class-title" class="text-xl sm:text-2xl md:text-4xl font-black text-blue-700 flex items-center gap-2 sm:gap-3 text-3d-light"></h2>
                <button onclick="showHome()" class="btn-3d-super bg-gradient-to-b from-gray-200 to-gray-300 text-gray-800 px-3 md:px-5 py-1.5 md:py-2 font-bold shadow-[0_4px_0_#64748b] flex items-center gap-1 sm:gap-2 text-xs sm:text-sm" style="--shadow-color: #64748b;">
                    <i class="fa-solid fa-arrow-left"></i> <span class="hidden sm:inline">ਮੁੱਖ ਪੰਨਾ</span>
                </button>
            </div>
            
            <!-- ਵਿਸ਼ੇ ਦਾ ਗਰਿੱਡ -->
            <div id="subjects-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6 px-1 md:px-6"></div>
        </div>

        <!-- ================= VIEW 3: SUBJECT VIEW (3D ਤਤਕਰਾ) ================= -->
        <div id="subject-view" class="view-section">
            <div class="flex items-center justify-between mb-4 clay-card p-2 md:p-3 bg-white">
                <div class="flex flex-col overflow-hidden">
                    <span id="breadcrumb-class" class="text-gray-500 font-extrabold text-[10px] sm:text-xs md:text-sm bg-gray-200 px-2 sm:px-3 py-0.5 rounded-full shadow-inner border border-gray-300 w-max mb-1"></span>
                    <h2 id="subject-title" class="text-lg sm:text-xl md:text-3xl font-black text-orange-600 flex items-center gap-1 sm:gap-2 text-3d-light truncate"></h2>
                </div>
                <button id="back-to-class-btn" class="btn-3d-super shrink-0 bg-gradient-to-b from-gray-200 to-gray-300 text-gray-800 px-3 py-1.5 md:py-2 font-bold shadow-[0_4px_0_#64748b] flex items-center gap-1 sm:gap-2 text-xs sm:text-sm" style="--shadow-color: #64748b;">
                    <i class="fa-solid fa-arrow-left"></i> <span class="hidden sm:inline">ਪਿੱਛੇ</span>
                </button>
            </div>

            <div class="clay-card bg-white overflow-hidden flex flex-col p-1.5 md:p-2">
                <div class="bg-gradient-to-r from-blue-500 to-sky-500 text-white text-center py-2 md:py-3 rounded-t-xl md:rounded-xl shadow-inner mb-1 md:mb-2 border-b-2 md:border-b-4 border-blue-700">
                    <h1 class="text-lg sm:text-xl md:text-2xl font-black tracking-wide text-3d"><i class="fa-solid fa-list-ol mr-2 opacity-80"></i> ਪਾਠ ਸੂਚੀ (Index)</h1>
                </div>

                <!-- ਟੇਬਲ ਹੈਡਰ (Responsive constraints applied) -->
                <div class="flex bg-sky-100 text-sky-900 font-black text-[10px] sm:text-xs md:text-base border-b-2 md:border-b-4 border-sky-300 shadow-sm rounded-t-lg mx-1 index-table-header">
                    <div class="w-10 sm:w-12 md:w-16 text-center py-2 md:py-3 border-r border-sky-300 table-col-sno">ਨੰ.</div>
                    <div class="flex-1 py-2 md:py-3 px-1 sm:px-2 md:px-4 border-r border-sky-300 table-col-name truncate">ਪਾਠ ਦਾ ਨਾਂ</div>
                    <div class="w-14 sm:w-16 md:w-24 text-center py-2 md:py-3 border-r border-sky-300 table-col-type">ਵਿਧਾ</div>
                    <div class="w-10 sm:w-12 md:w-16 text-center py-2 md:py-3 border-r border-sky-300 table-col-page">ਪੰਨਾ</div>
                    <div class="w-16 sm:w-20 md:w-28 text-center py-2 md:py-3 flex items-center justify-center table-col-btn">ਖੋਲ੍ਹੋ</div>
                </div>

                <!-- ਲਿਸਟ ਕੰਟੇਨਰ (Scrollable) -->
                <div id="chapters-list-container" class="flex flex-col text-gray-700 font-bold text-xs sm:text-sm md:text-lg overflow-y-auto max-h-[60vh] custom-scroll px-1 pb-2">
                    <!-- JS ਰਾਹੀਂ ਕਤਾਰਾਂ ਬਣਨਗੀਆਂ -->
                </div>
            </div>
        </div>

        <!-- ================= VIEW 5: CONTENT (IFRAME) ================= -->
        <div id="content-view" class="view-section">
            <div class="clay-card bg-white p-2 md:p-3 mb-3 flex items-center justify-between">
                <h2 id="content-title" class="text-base sm:text-lg md:text-2xl font-black text-blue-700 truncate flex items-center gap-2 w-[70%]">
                    <i class="fa-solid fa-book-open text-orange-500"></i> <span class="truncate">ਪੜ੍ਹੋ</span>

        // ---------------- ਫੰਕਸ਼ਨਜ਼ ----------------
        let previousViewId = 'home-view';

        function renderAssemblySlides() {
            const latestGrid = document.getElementById('latest-assembly-grid');
            let latestHtml = '';
            assemblySlides.forEach((slide, index) => {
                const isNew = index === 0 ? `<div class="absolute -top-3 -right-3 bg-red-500 text-white font-black px-4 py-1 rounded-full shadow-[0_4px_0_#991b1b] animate-bounce border-2 border-white text-xs z-20">ਨਵਾਂ</div>` : '';
                latestHtml += `
                    <a href="javascript:void(0)" onclick="openContent('${slide.dateId}.html', '${slide.displayDate}')" class="btn-3d-super block bg-white rounded-3xl p-4 sm:p-5 shadow-[0_6px_0_#cbd5e1,0_10px_15px_rgba(0,0,0,0.1)] hover:shadow-[0_6px_0_#cbd5e1,0_15px_20px_rgba(0,0,0,0.15)] border-2 border-gray-200" style="--shadow-color: #cbd5e1;">
                        ${isNew}
                        <div class="flex items-center gap-3 sm:gap-4">
                            <div class="bg-gradient-to-b from-orange-300 to-orange-500 text-white w-12 h-12 sm:w-14 sm:h-14 rounded-2xl flex items-center justify-center shadow-inner border-2 border-white/50 text-xl sm:text-2xl shrink-0">
                                <i class="fa-regular fa-calendar-check"></i>
                            </div>
                            <div class="overflow-hidden">
                                <h4 class="font-extrabold text-gray-800 text-lg sm:text-xl truncate">${slide.displayDate}</h4>
                                <span class="bg-blue-100 text-blue-700 px-2 sm:px-3 py-1 rounded-lg text-[10px] sm:text-xs font-black uppercase tracking-wider shadow-sm inline-block mt-1">${slide.day}</span>
                            </div>
                        </div>
                    </a>`;
            });
            if (latestGrid) latestGrid.innerHTML = latestHtml;
        }

        function openContent(url, title) {
            const activeEl = document.querySelector('.view-section.active');
            if (activeEl && activeEl.id !== 'content-view') previousViewId = activeEl.id;
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.getElementById('content-view').classList.add('active');
            document.getElementById('content-title').innerHTML = `<i class="fa-solid fa-gamepad text-orange-500 float-anim inline-block mr-2"></i> <span class="truncate">${title}</span>`;
            document.getElementById('iframe-loader').style.display = 'flex';
            document.getElementById('app-iframe').src = url;
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function closeContent() {
            document.getElementById('app-iframe').src = ""; 
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.getElementById(previousViewId).classList.add('active');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function showHome() {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.getElementById('home-view').classList.add('active');
        }

        function openAssemblyView() {
            openContent('assembly.html', 'ਸਵੇਰ ਦੀ ਸਭਾ');
        }

        function openClass(classId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.getElementById('class-view').classList.add('active');
            
            const classInfo = schoolData[classId];
            document.getElementById('class-title').innerHTML = `
                <span class="bg-gradient-to-b from-blue-400 to-blue-600 text-white w-12 h-12 md:w-16 md:h-16 rounded-2xl flex items-center justify-center shadow-inner border-2 border-white/50 text-2xl md:text-3xl shrink-0">
                    <i class="fa-solid fa-layer-group"></i>
                </span>
                <span class="drop-shadow-sm truncate">${classInfo.name}</span>
            `;
            
            const subjectsGrid = document.getElementById('subjects-grid');
            let subjectsHtml = '';
            
            classInfo.subjects.forEach(subject => {
                const bgInfo = subject.bgInfo;
                const crownHtml = bgInfo.specialCrown ? `<div class="absolute -top-4 -right-2 md:-top-6 md:-right-2 text-4xl md:text-5xl drop-shadow-lg z-20" style="transform: rotate(15deg);">👑</div>` : '';
                
                subjectsHtml += `
                    <button onclick="openSubject(${classId}, '${subject.id}')" class="btn-3d-super bg-gradient-to-b ${bgInfo.grad} text-white rounded-[2.5rem] p-5 md:p-8 shadow-[0_10px_0_${bgInfo.shadow},0_15px_20px_rgba(0,0,0,0.3)] hover:shadow-[0_10px_0_${bgInfo.shadow},0_20px_25px_rgba(0,0,0,0.5)] flex flex-col items-center justify-center gap-3 md:gap-5 border-4 border-white/20 group relative overflow-hidden landscape-shrink" style="--shadow-color: ${bgInfo.shadow};">
                        <div class="absolute -left-6 -bottom-6 text-white/10 text-7xl md:text-9xl rotate-[-20deg] group-hover:rotate-0 transition-transform duration-700 subject-card-icon">
                            <i class="fa-solid ${subject.icon}"></i>
                        </div>
                        ${crownHtml}
                        <div class="bg-white/20 w-16 h-16 md:w-24 md:h-24 rounded-full flex items-center justify-center backdrop-blur-md border-4 border-white/60 z-10 shadow-[inset_0_4px_10px_rgba(255,255,255,0.8),0_10px_15px_rgba(0,0,0,0.2)] ${bgInfo.iconAnim}">
                            <span class="text-3xl md:text-5xl drop-shadow-md">${bgInfo.emoji}</span>
                        </div>
                        <span class="text-xl sm:text-2xl lg:text-4xl font-black z-10 text-3d tracking-wide text-center w-full px-1 leading-tight subject-card-title">${subject.name}</span>
                        <div class="bg-black/20 px-4 md:px-6 py-1.5 md:py-2 rounded-full text-[10px] md:text-sm font-extrabold text-white/90 z-10 shadow-inner border border-white/10">
                            ਖੋਲ੍ਹੋ <i class="fa-solid fa-hand-pointer ml-1"></i>
                        </div>
                    </button>
                `;
            });
            subjectsGrid.innerHTML = subjectsHtml;
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function openSubject(classId, subjectId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.getElementById('subject-view').classList.add('active');
            
            const classInfo = schoolData[classId];
            const subject = classInfo.subjects.find(s => s.id === subjectId);
            
            document.getElementById('breadcrumb-class').textContent = classInfo.name;
            document.getElementById('subject-title').innerHTML = `<span class="text-2xl md:text-4xl ${subject.bgInfo.iconAnim} inline-block">${subject.bgInfo.emoji}</span> <span class="truncate">${subject.name}</span>`;
            
            const chaptersListContainer = document.getElementById('chapters-list-container');
            let chaptersHtml = '';
            const chapters = subject.chapters;

            for(let i = 1; i <= chapters.length; i++) {
                const chapter = chapters[i-1];
                const fileName = `ਪਾਠ/${classId}-${subject.code}-${i}.html`;
                const bgColor = (i-1) % 2 === 0 ? 'bg-white' : 'bg-sky-50/50';
                
                chaptersHtml += `
                    <div class="flex items-center ${bgColor} border-b-2 border-gray-100 text-gray-700 hover:bg-sky-100 transition-all hover:scale-[1.01] hover:shadow-md hover:z-10 relative">
                        <div class="table-col-sno w-10 sm:w-14 md:w-20 text-center py-2 md:py-4 text-sky-700 font-black text-xs md:text-xl border-r-2 border-dashed border-sky-200">
                            <div class="bg-sky-200/50 w-6 h-6 md:w-10 md:h-10 mx-auto rounded-full flex items-center justify-center shadow-inner">${i}</div>
                        </div>
                        <div class="table-col-name flex-1 py-2 md:py-4 px-2 md:px-4 font-black text-xs sm:text-sm md:text-2xl truncate text-gray-800 drop-shadow-sm index-table-content">
                            ${chapter.t}
                        </div>
                        <div class="table-col-type w-14 sm:w-20 md:w-28 text-center py-2 md:py-4">
                            <span class="bg-gradient-to-r from-gray-100 to-gray-200 px-1 md:px-3 py-1 md:py-1.5 rounded-md md:rounded-lg border border-gray-300 font-extrabold text-[9px] sm:text-[10px] md:text-sm shadow-sm truncate block mx-0.5 md:mx-1">${chapter.ty}</span>
                        </div>
                        <div class="table-col-page w-10 sm:w-12 md:w-20 text-center py-2 md:py-4 font-black text-sky-800 text-[10px] sm:text-xs md:text-lg border-l-2 border-dashed border-sky-200">
                            ${chapter.p}
                        </div>
                        <div class="table-col-btn w-16 sm:w-24 md:w-36 flex items-center justify-center py-2 md:py-4 px-1 md:px-0">
                            <button onclick="openContent('${fileName}', 'ਪਾਠ ${i}: ${chapter.t}')" class="btn-3d-super index-btn bg-gradient-to-b from-sky-400 to-blue-600 text-white px-2 sm:px-4 md:px-8 py-1 md:py-3 rounded-lg md:rounded-xl text-[10px] sm:text-xs md:text-lg font-black shadow-[0_3px_0_#1d4ed8] md:shadow-[0_6px_0_#1d4ed8] flex items-center gap-1 md:gap-2 w-full justify-center mx-0.5 md:mx-1" style="--shadow-color: #1d4ed8;">
                                <i class="fa-solid fa-play"></i> <span class="hidden sm:inline">ਖੇਡੋ</span>
                            </button>
                        </div>
                    </div>
                `;
            }

            chaptersListContainer.innerHTML = chaptersHtml;
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        window.onload = () => { renderAssemblySlides(); };
    </script>
