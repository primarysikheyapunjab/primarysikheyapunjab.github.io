<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ਮਿਸ਼ਨ ਸਮਰੱਥ - ਅਭਿਆਸ ਸ਼ੀਟ 1 (Live)</title>
    <style>
        /* --- ਮਾਸਟਰ ਲੇਆਊਟ --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; }
        html, body { width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        
        /* --- ਫਿਕਸਡ ਸਟੂਡੀਓ ਫਰੇਮ --- */
        #studio-frame { 
            background: #fffdf5; position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); overflow: hidden; 
            container-type: size; box-shadow: 0 0 50px rgba(0,0,0,1);
        }
        
        @media (orientation: landscape) {
            #studio-frame { width: 100vw; height: 56.25vw; max-height: 100vh; max-width: 177.78vh; }
            #viewport { flex-direction: row; }
            #viewport.math-active #math-panel { display: flex; width: 30%; }
        }
        
        @media (orientation: portrait) {
            #studio-frame { height: 100vh; width: 56.25vh; max-width: 100vw; max-height: 177.78vw; }
            #viewport { flex-direction: column; }
            #viewport.math-active #math-panel { display: flex; height: 40%; width: 100%; }
        }

        /* --- ਬੈਕਗ੍ਰਾਊਂਡ --- */
        #bg-layer { position: absolute; inset: 0; z-index: 1; background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb, #84fab0, #8fd3f4); background-size: 400% 400%; animation: moveBG 20s ease infinite; }
        @keyframes moveBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        #border-frame { position: absolute; inset: 0; z-index: 1000; pointer-events: none; border: 2cqmin solid rgba(255, 255, 255, 0.8); box-shadow: inset 0 0 3cqmin rgba(0,0,0,0.3); }
        
        #viewport { position: absolute; inset: 0; z-index: 10; display: flex; gap: 2cqmin; padding: 3cqmin; align-items: stretch; }
        
        /* --- ਫਲੈਸ਼ ਕਾਰਡ --- */
        .flash-card { flex-grow: 1; position: relative; height: 100%; background: linear-gradient(135deg, #ffffff 0%, #f4f4f4 100%); border: 0.8cqmin solid #fff; border-radius: 4cqmin; padding: 4cqmin; color: #111; box-shadow: 0 3cqmin 8cqmin rgba(0,0,0,0.4), inset 0 1cqmin 2cqmin rgba(255,255,255,0.8); opacity: 0; transform: scale(0.95); transition: all 1s cubic-bezier(0.25, 1, 0.5, 1); visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; gap: 2cqmin; overflow: hidden; }
        .flash-card.active { opacity: 1; transform: scale(1); visibility: visible; z-index: 100; }
        .flash-card.exit { animation: swipeOutUp 0.8s forwards cubic-bezier(0.5, -0.2, 0.5, 1.2); pointer-events: none; }
        .flash-card.exit-down { animation: swipeOutDown 0.8s forwards cubic-bezier(0.5, -0.2, 0.5, 1.2); pointer-events: none; }
        @keyframes swipeOutUp { 0% { transform: scale(1) translateY(0); opacity: 1; } 100% { transform: scale(0.9) translateY(-100vh); opacity: 0; } }
        @keyframes swipeOutDown { 0% { transform: scale(1) translateY(0); opacity: 1; } 100% { transform: scale(0.9) translateY(100vh); opacity: 0; } }
        .gentle-exit { animation: smoothFadeOut 1.5s ease-in-out forwards !important; pointer-events: none; }
        @keyframes smoothFadeOut { 0% { opacity: 1; filter: blur(0); } 100% { opacity: 0; filter: blur(10px); transform: scale(1.05); } }

        /* --- ਅੱਖਰਾਂ ਦੀ ਸੈਟਿੰਗ --- */
        .header-msg { font-size: 5cqmin; line-height: 1.3; padding-bottom: 1cqmin; width: 100%; font-weight: 900; text-align: center; color: #ff6b81; border-bottom: 0.5cqmin dashed #ff6b81; flex-shrink: 0; margin-bottom: 1cqmin; }
        .text-container { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; width: 100%; flex-grow: 1; overflow-y: auto; overscroll-behavior: contain; padding-bottom: 2cqmin;}
        .type-block { text-align: center; white-space: pre-wrap; word-wrap: break-word; width: 100%; }
        .title-text { font-weight: 900; color: #d32f2f; line-height: 1.3; margin-bottom: 2cqmin; background: rgba(255, 255, 255, 0.7); padding: 1.5cqmin; border-radius: 1.5cqmin; border-left: 1cqmin solid #ff6b81; box-shadow: 0 0.5cqmin 1.5cqmin rgba(0,0,0,0.05); flex-shrink: 0; }
        .main-content { line-height: 1.4; font-weight: bold; color: #000; flex-shrink: 0; margin-bottom: 1cqmin; }
        .ans-area { color: #1b5e20; font-weight: 900; line-height: 1.4; margin-top: 1cqmin; flex-shrink: 0; transition: opacity 0.5s; opacity: 0; }
        
        /* --- 3D Elements & Step Logic --- */
        #html-block { width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2cqmin; margin: 1cqmin 0; transition: opacity 0.5s; opacity: 0; }
        .flex-row { display: flex; align-items: center; justify-content: center; gap: 2cqmin; flex-wrap: wrap; width: 100%; }
        .emoji-box { font-size: 6cqmin; letter-spacing: 0.2cqmin; filter: drop-shadow(0px 0.5cqmin 0.5cqmin rgba(0,0,0,0.4)); background: #fff; padding: 1cqmin 2cqmin; border-radius: 1.5cqmin; box-shadow: inset 0 0.5cqmin 1cqmin rgba(0,0,0,0.1); display: inline-block; text-align: center; }
        
        /* Box Styling */
        .input-box, .tick-box { 
            border: 0.4cqmin solid #a0a0a0; display: inline-flex; align-items: center; justify-content: center; 
            background: linear-gradient(to bottom, #ffffff, #e6e6e6); border-radius: 1.5cqmin; 
            box-shadow: 0 0.8cqmin 0px #999, 0 1cqmin 1.5cqmin rgba(0,0,0,0.2), inset 0 0.3cqmin 0.5cqmin rgba(255,255,255,1); 
        }
        .input-box { padding: 0.5cqmin 2cqmin; min-width: 8cqmin; min-height: 8cqmin; font-size: 6cqmin; font-weight: 900; }
        .tick-box { width: 7cqmin; height: 7cqmin; font-size: 5cqmin; font-weight: bold; }
        
        /* Answer Reveal Animations */
        .ans-box { transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); }
        .ans-box.pressed { transform: translateY(0.8cqmin); box-shadow: 0 0px 0px #999, inset 0 0.5cqmin 1cqmin rgba(0,0,0,0.2); background: linear-gradient(to bottom, #e0ffe0, #ccffcc); border-color: #4caf50; }
        .ans-target { opacity: 0 !important; visibility: hidden; transform: scale(0.5); transition: all 0.3s ease; }
        .ans-target.revealed { opacity: 1 !important; visibility: visible; transform: scale(1); text-shadow: 1px 1px 0px #fff; }

        /* --- FADE OUT & STEP LOGIC (ਸਵਾਲ ਨੂੰ ਧੁੰਦਲਾ ਕਰਨ ਲਈ) --- */
        .hidden-step { display: none !important; }
        .q-step { transition: all 0.6s ease; opacity: 1; transform: scale(1); width: 100%; display: flex; justify-content: center; transform-origin: center center; }
        
        .active-step { animation: highlightStep 1.5s infinite alternate; z-index: 10; position: relative;}
        @keyframes highlightStep { 0% { transform: scale(1); } 100% { transform: scale(1.02); } }
        
        /* ਇਹ ਕਲਾਸ ਪੁਰਾਣੇ ਸਵਾਲਾਂ ਨੂੰ ਧੁੰਦਲਾ ਕਰੇਗੀ */
        .dimmed-step { opacity: 0.35 !important; transform: scale(0.95) !important; filter: grayscale(50%); pointer-events: none; }

        /* Emoji individual items for fading */
        .e-item { display: inline-block; transition: all 0.4s ease; }
        .e-item.faded { opacity: 0.15 !important; transform: scale(0.7); filter: grayscale(100%); }

        .grid-layout { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5cqmin; width: 100%; justify-items: center; }
        .mcq-box { border: 0.4cqmin solid #70a1ff; padding: 1.5cqmin; text-align: center; background: #fff; border-radius: 1.5cqmin; box-shadow: 0 1cqmin 2cqmin rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
        .mcq-label { background: #ffeb3b; padding: 0.5cqmin 1.5cqmin; border-radius: 1cqmin; box-shadow: 0 0.5cqmin 1cqmin rgba(0,0,0,0.2); font-weight: bold; font-size: 4cqmin; margin-bottom: 1cqmin; }

        /* --- Creator Strip --- */
        #creator-strip { display: none; opacity: 0; transform: translateY(2cqmin); transition: all 1s ease-out; border-top: 0.3cqmin dashed #ffb6c1; padding-top: 1cqmin; width: 100%; line-height: 1.2; text-align: center; flex-shrink: 0; margin-top: auto; }
        .creator-label { font-size: 3cqmin; color: #333; font-weight: 900; }
        .creator-name { font-size: 4.5cqmin; color: #d32f2f; font-weight: 900; margin: 0.2cqmin 0; }
        
        /* --- Intro Screen --- */
        .intro-wrapper { position: absolute; inset: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .intro-date-top { position: absolute; top: 4cqmin; left: 50%; transform: translateX(-50%); font-weight: 900; color: #fff; background: #ff6b81; padding: 1.5cqmin 4cqmin; border-radius: 5cqmin; box-shadow: 0 1cqmin 3cqmin rgba(0,0,0,0.25); border: 0.5cqmin dashed #fff; z-index: 100; font-size: 4.5cqmin; white-space: nowrap; animation: popCenterAnim 0.8s forwards; opacity: 0; }
        
        .center-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); background: radial-gradient(circle, #ffffff 40%, #ffeb3b 100%); border: 1.5cqmin solid #ff9f43; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 2cqmin 6cqmin rgba(0,0,0,0.5); z-index: 50; animation: popCenterAnim 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 0.2s; opacity: 0; width: 42cqmin; height: 42cqmin; }
        
        @keyframes popCenterAnim { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        
        .intro-title { font-weight: 900; color: #d32f2f; text-align: center; line-height: 1.1; font-size: 6cqmin; display: flex; flex-direction: column; align-items: center; gap: 0.8cqmin; }
        .intro-sub { font-size: 3.5cqmin; color: #8B4513; }
        .intro-badge { font-size: 3.2cqmin; background: #ff6b81; color: #fff; padding: 0.5cqmin 1.5cqmin; border-radius: 2cqmin; box-shadow: 0 0.5cqmin 1cqmin rgba(0,0,0,0.2); }
        
        .badge-pos { position: absolute; z-index: 60; }
        .float-wrap { animation: gentleFloat 4s ease-in-out infinite alternate; display: flex; flex-direction: column; align-items: center; }
        @keyframes gentleFloat { 0% { transform: translateY(2cqmin); } 100% { transform: translateY(-2cqmin); } }
        .balloon-body { position: relative; border-radius: 50% 50% 50% 50% / 45% 45% 55% 55%; color: #fff; font-weight: 900; box-shadow: 0 1.5cqmin 3cqmin rgba(0,0,0,0.4), inset -1cqmin -1cqmin 2cqmin rgba(0,0,0,0.2); text-align: center; line-height: 1.2; display: flex; align-items: center; justify-content: center; width: 20cqmin; height: 22cqmin; font-size: 4cqmin; padding: 1.5cqmin; }
        .balloon-body::before { content: ''; position: absolute; top: 12%; left: 15%; width: 25%; height: 25%; background: radial-gradient(circle, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0) 70%); border-radius: 50%; }
        .balloon-knot { width: 0; height: 0; border-left: 1cqmin solid transparent; border-right: 1cqmin solid transparent; border-bottom: 1.5cqmin solid; margin-top: -0.5cqmin; z-index: 2; }
        .balloon-string { width: 0.3cqmin; height: 6cqmin; background: rgba(0,0,0,0.4); border-radius: 2px; z-index: 1; }
        
        .color-1 { background: linear-gradient(135deg, #ff4757, #ff6b81); } .knot-1 { border-bottom-color: #ff4757; }
        .color-2 { background: linear-gradient(135deg, #ffa502, #ff7f50); } .knot-2 { border-bottom-color: #ffa502; }
        .color-3 { background: linear-gradient(135deg, #1e90ff, #70a1ff); } .knot-3 { border-bottom-color: #1e90ff; }
        .color-4 { background: linear-gradient(135deg, #2ed573, #7bed9f); } .knot-4 { border-bottom-color: #2ed573; }
        .color-5 { background: linear-gradient(135deg, #9b59b6, #8e44ad); } .knot-5 { border-bottom-color: #9b59b6; } 
        .color-6 { background: linear-gradient(135deg, #e84393, #fd79a8); } .knot-6 { border-bottom-color: #e84393; }

        @keyframes dropBalloon { 0% { opacity: 0; transform: translateY(-50cqh) scale(0.5); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        .pos-1 { top: 10%; left: 10%; opacity: 0; animation: dropBalloon 1.5s cubic-bezier(0.25, 1, 0.5, 1) 0.2s forwards; }
        .pos-3 { top: 40%; left: 5%; opacity: 0; animation: dropBalloon 1.5s cubic-bezier(0.25, 1, 0.5, 1) 1.0s forwards; }
        .pos-5 { bottom: 10%; left: 15%; opacity: 0; animation: dropBalloon 1.5s cubic-bezier(0.25, 1, 0.5, 1) 1.8s forwards; }
        .pos-2 { top: 10%; right: 10%; opacity: 0; animation: dropBalloon 1.5s cubic-bezier(0.25, 1, 0.5, 1) 0.6s forwards; }
        .pos-4 { top: 40%; right: 5%; opacity: 0; animation: dropBalloon 1.5s cubic-bezier(0.25, 1, 0.5, 1) 1.4s forwards; }
        .pos-6 { bottom: 10%; right: 15%; opacity: 0; animation: dropBalloon 1.5s cubic-bezier(0.25, 1, 0.5, 1) 2.2s forwards; }

        /* --- Math Toggle Button --- */
        #math-toggle-btn {
            position: absolute; top: 2cqmin; right: 2cqmin; z-index: 2000;
            background: linear-gradient(135deg, #fbc531, #e1b12c); color: #fff;
            border: 0.4cqmin solid #fff; border-radius: 3cqmin; padding: 1cqmin 2cqmin;
            font-size: 3cqmin; font-weight: 900; cursor: pointer;
            box-shadow: 0 0.5cqmin 1cqmin rgba(0,0,0,0.3); transition: all 0.2s;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.4); display: none; /* Initially hidden until start */
        }
        #math-toggle-btn:active { transform: translateY(0.3cqmin); box-shadow: none; }

        /* --- Math Panel --- */
        #math-panel { 
            display: none; 
            background: linear-gradient(135deg, #ffffff 0%, #f4f4f4 100%); border: 0.8cqmin solid #fff; border-radius: 4cqmin; flex-direction: column; padding: 3cqmin; color: #111; box-shadow: 0 3cqmin 8cqmin rgba(0,0,0,0.4), inset 0 1cqmin 2cqmin rgba(255,255,255,0.8); z-index: 100; flex-shrink: 0; 
        }
        .mp-title { text-align: center; font-size: 4cqmin; font-weight: 900; color: #d32f2f; border-bottom: 0.4cqmin dashed #ff6b81; padding-bottom: 1cqmin; margin-bottom: 1.5cqmin; }
        .mp-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5cqmin; margin-bottom: 1.5cqmin; flex-shrink: 0; }
        
        .mp-btn { color: #fff; border: 0.3cqmin solid rgba(255,255,255,0.5); border-radius: 5cqmin; padding: 1.2cqmin; font-size: 3.2cqmin; font-weight: 900; cursor: pointer; transition: all 0.15s; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; }
        .mp-btn:active { transform: translateY(0.6cqmin); }
        .mp-btn.add-bundle { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); box-shadow: 0 0.8cqmin 0 #0b736a, 0 1.5cqmin 2cqmin rgba(0,0,0,0.3); }
        .mp-btn.add-bundle:active { box-shadow: 0 0.2cqmin 0 #0b736a, 0 0.5cqmin 1cqmin rgba(0,0,0,0.2); }
        .mp-btn.add-stick { background: linear-gradient(135deg, #f2994a 0%, #f2c94c 100%); box-shadow: 0 0.8cqmin 0 #c27a3b, 0 1.5cqmin 2cqmin rgba(0,0,0,0.3); }
        .mp-btn.add-stick:active { box-shadow: 0 0.2cqmin 0 #c27a3b, 0 0.5cqmin 1cqmin rgba(0,0,0,0.2); }
        .mp-btn.sub-bundle { background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%); box-shadow: 0 0.8cqmin 0 #c70635, 0 1.5cqmin 2cqmin rgba(0,0,0,0.3); }
        .mp-btn.sub-bundle:active { box-shadow: 0 0.2cqmin 0 #c70635, 0 0.5cqmin 1cqmin rgba(0,0,0,0.2); }
        .mp-btn.sub-stick { background: linear-gradient(135deg, #b515d9 0%, #f093fb 100%); box-shadow: 0 0.8cqmin 0 #8510a3, 0 1.5cqmin 2cqmin rgba(0,0,0,0.3); }
        .mp-btn.sub-stick:active { box-shadow: 0 0.2cqmin 0 #8510a3, 0 0.5cqmin 1cqmin rgba(0,0,0,0.2); }
        .mp-btn.clear { background: linear-gradient(135deg, #8e9eab 0%, #eef2f3 100%); color: #333; text-shadow: none; box-shadow: 0 0.8cqmin 0 #6e7a84, 0 1.5cqmin 2cqmin rgba(0,0,0,0.3); grid-column: span 2; }
        .mp-btn.clear:active { box-shadow: 0 0.2cqmin 0 #6e7a84, 0 0.5cqmin 1cqmin rgba(0,0,0,0.2); }
        
        #mp-display { flex-grow: 1; background: rgba(0, 0, 0, 0.04); border-radius: 2.5cqmin; padding: 2cqmin; display: flex; flex-wrap: wrap; align-content: flex-start; gap: 1.5cqmin; overflow-y: auto; overscroll-behavior: contain; box-shadow: inset 0 1cqmin 2cqmin rgba(0,0,0,0.1), 0 0 0 0.3cqmin #fff; }
        .mp-total { font-size: 5cqmin; font-weight: 900; text-align: center; margin-top: 1.5cqmin; background: linear-gradient(135deg, #ff9a9e, #fecfef); color: #d32f2f; padding: 1.5cqmin; border-radius: 3cqmin; flex-shrink: 0; box-shadow: 0 1cqmin 2cqmin rgba(0,0,0,0.15), inset 0 0.5cqmin 1cqmin rgba(255,255,255,0.8); border: 0.4cqmin solid #fff; }
        
        .stick { width: 1cqmin; height: 8cqmin; background: #fbc531; border-radius: 0.3cqmin; position: relative; margin: 0 0.2cqmin; box-shadow: 0 0.2cqmin 0.4cqmin rgba(0,0,0,0.3); display: inline-block; }
        .stick::before { content: ''; position: absolute; top: -0.6cqmin; left: -0.2cqmin; width: 1.4cqmin; height: 1.5cqmin; background: #e84118; border-radius: 50%; }
        .bundle { display: inline-flex; align-items: center; justify-content: center; position: relative; padding: 0.5cqmin; margin: 0.5cqmin; background: rgba(0,0,0,0.1); border-radius: 1cqmin; box-shadow: inset 0 0 1cqmin rgba(0,0,0,0.05);}
        .bundle::after { content: ''; position: absolute; top: 50%; left: -0.5cqmin; right: -0.5cqmin; height: 1.5cqmin; background: #e84118; transform: translateY(-50%); z-index: 2; border-radius: 0.5cqmin; box-shadow: 0 0.3cqmin 0.6cqmin rgba(0,0,0,0.4); }

        /* --- Live Mode Tap Indicator --- */
        #tap-indicator { position: absolute; bottom: 3cqmin; left: 50%; transform: translateX(-50%); background: #ffeb3b; color: #d32f2f; font-weight: 900; padding: 1.5cqmin 4cqmin; border-radius: 3cqmin; font-size: 4cqmin; box-shadow: 0 1cqmin 2cqmin rgba(0,0,0,0.3); animation: bounceUp 1s infinite alternate; z-index: 1000; display: none; pointer-events: none; border: 0.4cqmin solid #d32f2f; white-space: nowrap; }
        @keyframes bounceUp { 0% { transform: translate(-50%, 0) scale(1); } 100% { transform: translate(-50%, -1.5cqmin) scale(1.05); } }

    </style>
</head>
<body>

    <div id="studio-frame">
        <div id="bg-layer"></div>
        <div id="border-frame"></div>
        
        <!-- Toggle Button for Rough Work -->
        <button id="math-toggle-btn" onclick="toggleMathPanel()">📝 ਰਫ਼ ਕੰਮ</button>

        <!-- Viewport Container -->
        <div id="viewport" class="">
            <!-- Left Side: Flash Card -->
            <div class="flash-card" id="master-card">
                <div class="header-msg" id="card-header" style="display: none;"></div>
                
                <div class="text-container">
                    <div class="title-text type-block" id="type-title"></div>
                    <div class="main-content type-block" id="type-main"></div>
                    <div id="html-block"></div>
                    <div class="ans-area type-block" id="type-ans"></div>
                </div>
                
                <div id="creator-strip">
                    <div class="creator-label">ਸਿੱਖਿਆ ਵਿਭਾਗ, ਪੰਜਾਬ ਦੁਆਰਾ ਜਾਰੀ</div>
                    <div class="creator-name">ਮਿਸ਼ਨ ਸਮਰੱਥ 2026-27</div>
                </div>
                
                <div id="tap-indicator">👉 ਅੱਗੇ ਵਧਣ ਲਈ ਟੈਪ ਕਰੋ</div>
            </div>
            
            <!-- Right Side: Math Panel -->
            <div id="math-panel">
                <div class="mp-title">ਰਫ਼ ਕੰਮ (ਬੰਡਲ-ਤੀਲੀ)</div>
                <div class="mp-buttons">
                    <button class="mp-btn add-bundle" onclick="addTen()">+ ਬੰਡਲ</button>
                    <button class="mp-btn add-stick" onclick="addOne()">+ ਤੀਲੀ</button>
                    <button class="mp-btn sub-bundle" onclick="subTen()">- ਬੰਡਲ</button>
                    <button class="mp-btn sub-stick" onclick="subOne()">- ਤੀਲੀ</button>
                    <button class="mp-btn clear" onclick="clearMath()">ਸਾਫ਼ ਕਰੋ (Clear)</button>
                </div>
                <div id="mp-display"></div>
                <div class="mp-total">ਕੁੱਲ = <span id="mp-total-val">0</span></div>
            </div>
        </div>
    </div>

<script>
    let currentStep = 0;
    let isTransitioning = false;
    let renderSessionId = 0; 
    let resolveTap = null;

    }

    // --- Math Tools Logic (Carry + Borrow Logic & Dynamic Fading) ---
    let mathTens = 0;
    let mathOnes = 0;

    function addTen() { mathTens++; updateMath(); }
    function subTen() { if(mathTens > 0) mathTens--; updateMath(); }
    
    function addOne() { 
        mathOnes++; 
        if(mathOnes >= 10) { // 10 ਤੀਲੀਆਂ ਹੋਣ ਤੇ 1 ਬੰਡਲ ਬਣੇਗਾ
            mathOnes = 0;
            mathTens++;
        }
        fadeActiveEmoji(false); // ਫੇਡ ਹਟਾਓ (ਉਜਾਗਰ ਕਰੋ)
        updateMath(); 
    }
    
    function subOne() { 
        if(mathOnes > 0) {
            mathOnes--; 
        } else if(mathTens > 0) { // ਤੀਲੀ ਨਹੀਂ ਹੈ ਪਰ ਬੰਡਲ ਹੈ, ਤਾਂ ਬੰਡਲ ਖੋਲ੍ਹੋ
            mathTens--;
            mathOnes = 9;
        } else {
            return; // ਕੁਝ ਨਹੀਂ ਬਚਿਆ
        }
        fadeActiveEmoji(true); // ਐਕਟਿਵ ਸਵਾਲ ਵਿੱਚੋਂ ਇੱਕ ਓਬਜੈਕਟ ਫੇਡ ਕਰੋ
        updateMath(); 
    }
    
    function clearMath() { 
        mathTens = 0; mathOnes = 0; updateMath(); 
        document.querySelectorAll('.e-item.faded').forEach(el => el.classList.remove('faded'));
    }

    function updateMath() {
        let total = (mathTens * 10) + mathOnes;
        document.getElementById('mp-total-val').innerText = total;
        
        let display = document.getElementById('mp-display');
        display.innerHTML = ''; 
        
        for(let i=0; i<mathTens; i++) {
            let bundle = document.createElement('div');
            bundle.className = 'bundle';
            for(let j=0; j<10; j++) {
                let stick = document.createElement('div');
                stick.className = 'stick';
                bundle.appendChild(stick);
            }
            display.appendChild(bundle);
        }
        
        for(let i=0; i<mathOnes; i++) {
            let stick = document.createElement('div');
            stick.className = 'stick';
            display.appendChild(stick);
        }
    }

    function fadeActiveEmoji(isFadingOut) {
        let container = document.getElementById('html-block');

                    <div class="flex-row" style="justify-content:space-around;">

                    <div style="font-size:4cqmin; font-weight:bold; color:#d32f2f;">13. ਅਗਲੀਆਂ ਸੰਖਿਆਵਾਂ: <span class="input-box" style="background:#ffeb3b; font-size:4cqmin; min-height:5cqmin;">4, 5, 6</span> -></div>
                    <div style="font-size:4cqmin; font-weight:bold;">i) 7, 8, 9 <span class="tick-box ans-box" style="width:5cqmin; height:5cqmin;"><span class="ans-target" style="font-size:3.5cqmin; color:#388e3c;">✓</span></span></div>

                <div class="flex-row q-step hidden-step" style="background:#fff; padding: 2cqmin; border-radius: 2cqmin; margin-bottom: 2cqmin; width:100%; justify-content:space-around;">
                    <div style="font-size:4cqmin; font-weight:bold; color:#d32f2f;">14. ਪੰਜ ਦਾ ਸਿੱਕਾ:</div>

        }

    function applyDynamicFontSize(text, elementId, isMain) {
        const el = document.getElementById(elementId); 
        if(!text) { el.style.display = 'none'; return; } else { el.style.display = 'block'; }
        const len = text.length;
        if (isMain) {
            if (len < 30) el.style.fontSize = "5cqmin";
            else if (len < 65) el.style.fontSize = "4.5cqmin";
            else el.style.fontSize = "4cqmin";
        } else {
            if(elementId === 'type-title') el.style.fontSize = "5.5cqmin";
            else el.style.fontSize = "4.5cqmin"; 
        }
    }

    function prepareTypewriter(id, text) {
        const el = document.getElementById(id);
        if(!el) return [];
        el.innerHTML = ""; 
        let elements = [];
        for (let i = 0; i < text.length; i++) {
            let char = text.charAt(i);
            if (char === '\n') el.appendChild(document.createElement('br'));
            else {
                let span = document.createElement('span');
                span.textContent = char; 
                span.style.opacity = '0';
                el.appendChild(span);
                elements.push(span);
            }
        }
        return elements;
    }

    async function playTypewriter(elements, speed, sessionId) {
        for (let i = 0; i < elements.length; i++) {
            if(renderSessionId !== sessionId) return; 
            elements[i].style.opacity = '1';
            await new Promise(r => setTimeout(r, speed));
        }
    }

    function waitForTap(msg) {
        let ind = document.getElementById('tap-indicator');
        ind.innerText = msg;
        ind.style.display = 'block';
        return new Promise(r => { resolveTap = r; });
    }

    function revealAnswers(container) {
        container.querySelectorAll('.ans-box').forEach(el => el.classList.add('pressed'));
        container.querySelectorAll('.ans-target').forEach(el => el.classList.add('revealed'));
    }

    async function renderSlide(idx) {
        if(idx < 0 || idx >= slideSteps.length) return;
        isTransitioning = true;
        resolveTap = null;
        document.getElementById('tap-indicator').style.display = 'none';
        
        renderSessionId++; let currentSession = renderSessionId;
        const data = slideSteps[idx];
        const card = document.getElementById('master-card');
        const creatorStrip = document.getElementById('creator-strip');
        const htmlBlock = document.getElementById('html-block');
        const typeAns = document.getElementById('type-ans');

        card.classList.remove('exit', 'exit-down', 'gentle-exit', 'active'); 
        card.style.visibility = "hidden";
        creatorStrip.style.display = "none"; creatorStrip.style.opacity = "0"; creatorStrip.style.transform = "translateY(2cqmin)";
        
        clearMath();

        const headerEl = document.getElementById('card-header');
        if(data.header) { headerEl.innerHTML = data.header; headerEl.style.display = "block"; } else { headerEl.style.display = "none"; }

        if(data.isIntro) {
            document.getElementById('type-title').style.display = 'none'; 
            document.getElementById('type-main').style.display = 'none'; 
            htmlBlock.style.display = 'none';
            typeAns.innerHTML = `
                <div class="intro-wrapper">
                    <div class="intro-date-top">${data.dateStr}</div>
                    <div class="center-circle">
                        <div class="intro-title">
                            ਮਿਸ਼ਨ<br>ਸਮਰੱਥ
                            <div class="intro-sub">2026-27</div>
                            <div class="intro-badge">ਜਮਾਤ 3 ਤੋਂ 5</div>
                        </div>
                    </div>
                    ${data.activities.map((act, i) => `<div class="badge-pos pos-${i+1}"><div class="float-wrap"><div class="balloon-body color-${i+1}">${act}</div><div class="balloon-knot knot-${i+1}"></div><div class="balloon-string"></div></div></div>`).join('')}
                </div>`;
            typeAns.style.display = 'block'; typeAns.style.opacity = '1';
            card.style.visibility = "visible"; card.classList.add('active');

            // Wait for tap to start
            isTransitioning = false;
            await waitForTap("👉 ਸ਼ੁਰੂ ਕਰਨ ਲਈ ਟੈਪ ਕਰੋ");
            if(renderSessionId !== currentSession) return;
            document.getElementById('tap-indicator').style.display = 'none';
            changeSlide(1, 'up');
            return;
        }

        document.getElementById('type-title').innerHTML = ""; document.getElementById('type-main').innerHTML = ""; typeAns.innerHTML = "";
        
        if (data.htmlContent) { 
            htmlBlock.innerHTML = wrapEmojisWithSpan(data.htmlContent); 
            htmlBlock.style.display = 'flex'; 
        } else { htmlBlock.style.display = 'none'; }
        
        await new Promise(r => setTimeout(r, 100)); 
        card.style.visibility = "visible"; card.classList.add('active');
        isTransitioning = false;

        applyDynamicFontSize(data.title, 'type-title', false);
        applyDynamicFontSize(data.main, 'type-main', true);
        applyDynamicFontSize(data.ans, 'type-ans', false);

        let titleSpans = prepareTypewriter('type-title', data.title || "");
        let mainSpans = prepareTypewriter('type-main', data.main || "");
        let ansSpans = prepareTypewriter('type-ans', data.ans || "");

        // --- Live Mode ONLY Logic ---
        htmlBlock.style.opacity = '1'; typeAns.style.opacity = '0';
        
        if(data.title) await playTypewriter(titleSpans, 30, currentSession);
        if(data.main) await playTypewriter(mainSpans, 40, currentSession);
        
        let qSteps = htmlBlock.querySelectorAll('.q-step');
        
        if (qSteps.length > 0) {
            for (let i = 0; i < qSteps.length; i++) {
                let step = qSteps[i];
                
                // ਪਿਛਲੇ ਸਾਰੇ ਸਵਾਲਾਂ ਨੂੰ ਧੁੰਦਲਾ (Dim) ਕਰੋ
                for(let prev = 0; prev < i; prev++) {
                    qSteps[prev].classList.remove('active-step');
                    qSteps[prev].classList.add('dimmed-step');
                }
                
                // ਮੌਜੂਦਾ ਸਵਾਲ ਦਿਖਾਓ
                step.classList.remove('hidden-step');
                step.classList.add('active-step'); 
                
                // ਉੱਤਰ ਦੇਖਣ ਲਈ ਟੈਪ ਦਾ ਇੰਤਜ਼ਾਰ
                await waitForTap("👉 ਉੱਤਰ ਦੇਖਣ ਲਈ ਟੈਪ ਕਰੋ");
                if(renderSessionId !== currentSession) return;
                document.getElementById('tap-indicator').style.display = 'none';
                
                // ਉੱਤਰ ਦਿਖਾਓ
                revealAnswers(step);
                
                // ਅਗਲੇ ਸਵਾਲ ਲਈ ਟੈਪ ਦਾ ਇੰਤਜ਼ਾਰ (ਜੇਕਰ ਬਾਕੀ ਹਨ)
                if (i < qSteps.length - 1) {
                    await waitForTap("👉 ਅਗਲੇ ਪ੍ਰਸ਼ਨ ਲਈ ਟੈਪ ਕਰੋ");
                    if(renderSessionId !== currentSession) return;
                    document.getElementById('tap-indicator').style.display = 'none';
                }
            }
        } else {
            if(!data.isEnd) {
                await waitForTap("👉 ਉੱਤਰ ਦੇਖਣ ਲਈ ਟੈਪ ਕਰੋ");
                if(renderSessionId !== currentSession) return;
                document.getElementById('tap-indicator').style.display = 'none';
                revealAnswers(htmlBlock);
            }
        }
        
        typeAns.style.opacity = '1';
        if(data.ans) await playTypewriter(ansSpans, 40, currentSession);
        if(data.isEnd) { creatorStrip.style.display = "block"; setTimeout(() => { creatorStrip.style.opacity = "1"; creatorStrip.style.transform = "translateY(0)"; }, 50); }
        
        // ਸਲਾਈਡ ਖਤਮ ਹੋਣ 'ਤੇ ਅਗਲੀ ਸਲਾਈਡ ਲਈ ਟੈਪ ਦਾ ਇੰਤਜ਼ਾਰ
        if(!data.isEnd) {
            await waitForTap("👉 ਅਗਲੀ ਸਲਾਈਡ ਲਈ ਟੈਪ ਕਰੋ");
            if(renderSessionId !== currentSession) return;
            document.getElementById('tap-indicator').style.display = 'none';
            changeSlide(1, 'up');
        }
    }

    function changeSlide(direction, animationType) {
        if(isTransitioning) return;
        let nextIndex = currentStep + direction;
        if(nextIndex >= 0 && nextIndex < slideSteps.length) {
            isTransitioning = true;
            resolveTap = null;
            document.getElementById('tap-indicator').style.display = 'none';
            
            const card = document.getElementById('master-card');
            card.classList.remove('active');
            
            if(slideSteps[currentStep].isIntro) {
                card.classList.add('gentle-exit'); setTimeout(() => { currentStep = nextIndex; renderSlide(currentStep); }, 1500); 
            } else {
                if(animationType === 'up') card.classList.add('exit'); else card.classList.add('exit-down'); 
                setTimeout(() => { currentStep = nextIndex; renderSlide(currentStep); }, 800); 
            }
        }
    }

    function toggleFullScreen() {
        try { if (!document.fullscreenElement) { if (document.documentElement.requestFullscreen) { document.documentElement.requestFullscreen().catch(err => {}); } } else { if (document.exitFullscreen) { document.exitFullscreen().catch(err => {}); } } } catch (e) {}
    }

    let touchStartX_tap = 0; let touchStartY_tap = 0; let isSwiping = false; let lastTapTime = 0;

    document.addEventListener('touchstart', e => { 
        if(e.target.closest('#math-panel') || e.target.closest('#math-toggle-btn') || e.target.tagName === 'BUTTON') return;
        touchStartX_tap = e.changedTouches[0].screenX; touchStartY_tap = e.changedTouches[0].screenY; isSwiping = false; 
    }, {passive: false});

    document.addEventListener('touchmove', e => {
        let diffX = Math.abs(e.changedTouches[0].screenX - touchStartX_tap); let diffY = Math.abs(e.changedTouches[0].screenY - touchStartY_tap);
        if (diffX > 15 || diffY > 15) isSwiping = true;
    }, {passive: false});

    document.addEventListener('touchend', e => {
        if(e.target.closest('#math-panel') || e.target.closest('#math-toggle-btn') || e.target.tagName === 'BUTTON') return;
        let diffY = touchStartY_tap - e.changedTouches[0].screenY;
        
        if(isSwiping && Math.abs(diffY) > 50) {
            if(diffY > 0) changeSlide(1, 'up'); else changeSlide(-1, 'down'); return; 
        } 
        
        if (!isSwiping) {
            if (resolveTap) { resolveTap(); return; } 
            const currentTime = new Date().getTime(); const tapLength = currentTime - lastTapTime;
            if (tapLength < 400 && tapLength > 0) { toggleFullScreen(); lastTapTime = 0; if(e.cancelable) e.preventDefault(); } 
            else { lastTapTime = currentTime; }
        }
    }, {passive: false});

    document.addEventListener('click', e => {
        if(e.target.closest('#math-panel') || e.target.closest('#math-toggle-btn') || e.target.tagName === 'BUTTON') return;
        if (resolveTap) { 
            let tempResolve = resolveTap; 
            resolveTap = null;
            tempResolve(); 
        } else if (!isTransitioning) {
            changeSlide(1, 'up');
        }
    });

    document.addEventListener('dblclick', e => { 
        if (!e.target.closest('#math-panel') && !e.target.closest('#math-toggle-btn') && e.target.tagName !== 'BUTTON') toggleFullScreen(); 
    });

</script>
